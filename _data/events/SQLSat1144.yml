precondetail: |
   <h2>Modern Data Warehousing with Microsoft Fabric</h2>
   <p>In the age of cloud analytics, today’s best practice is tomorrow’s legacy. Microsoft Fabric aims to be the one platform that rules them all, bringing together data engineering, warehousing, and visualization in a single Software-as-a-Service (SaaS) package. At the heart of this platform, Fabric Data Warehouse delivers a familiar yet modern T-SQL–based experience that is scalable, cloud-native, and tightly integrated with the broader Fabric ecosystem. </p>
   <p>Join Kristyna Ferris and Chris Hyde for deep dive on Friday, Aug 7 from 8am-5pm. <a href="https://www.eventbrite.com/e/modern-data-warehousing-with-microsoft-fabric-tickets-1989386955938">Register and get more details by clicking here</a>.</p>

